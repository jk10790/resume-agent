[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests (requires INTEGRATION_TESTS=true)
    ui: UI integration tests (requires UI_TESTS=true)
    slow: Slow running tests
    backend_api: Backend API integration tests
    frontend_e2e: Frontend end-to-end tests (requires UI_TESTS=true)
    frontend_playwright: React UI Playwright tests (requires UI_TESTS=true)
    cache: Cache system tests